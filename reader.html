<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>古诗文阅读 · 诗境</title>
  <link rel="stylesheet" href="./styles.css?v=20260712" />
  <link rel="stylesheet" href="./human-verification.css?v=20260712" />
</head>
<body>
  <div class="page-shell">
    <aside class="page-rail"></aside>
    <main class="app-main">
      <section class="top-toolbar">
        <a class="back-home-link" href="./index.html">诗境</a>
        <div id="queryStatus" class="query-status" role="status" aria-live="polite">等待查询</div>
        <button id="refreshArticleButton" class="toolbar-refresh-button toolbar-refresh-button-hidden" type="button">刷新内容</button>
        <div class="toggle-row toggle-row-compact">
          <label class="toggle-check" for="toggleTranslation">
            <input id="toggleTranslation" type="checkbox" />
          </label>
          <button class="toggle-jump" type="button" data-target-id="translationSection">译文</button>
        </div>
        <div class="toggle-row toggle-row-compact">
          <label class="toggle-check" for="toggleNotes">
            <input id="toggleNotes" type="checkbox" />
          </label>
          <button class="toggle-jump" type="button" data-target-id="notesSection">注释</button>
        </div>
        <div class="toggle-row toggle-row-compact">
          <label class="toggle-check" for="togglePinyin">
            <input id="togglePinyin" type="checkbox" checked />
          </label>
          <button class="toggle-jump" type="button" data-target-id="articleCanvas">拼音</button>
        </div>
        <div class="toggle-row toggle-row-compact">
          <label class="toggle-check" for="toggleRecitation">
            <input id="toggleRecitation" type="checkbox" />
          </label>
          <button class="toggle-jump" type="button" data-target-id="recitationSection">朗诵</button>
        </div>
        <button id="openReciteScrollButton" class="toolbar-recite-button" type="button">竹简背诵</button>
        <button id="favoriteArticleButton" class="toolbar-secondary-button" type="button" aria-pressed="false">收藏</button>
        <button id="shareArticleButton" class="toolbar-secondary-button" type="button">分享</button>
        <div class="annotation-tools">
          <button id="annotationModeButton" class="annotation-mode-button" type="button">批注模式</button>
          <div class="annotation-detail-tools">
            <button id="eraserModeButton" class="annotation-mode-button annotation-eraser-button" type="button">橡皮擦</button>
            <label class="annotation-control" for="annotationColor">
              <span>颜色</span>
              <input id="annotationColor" type="color" value="#c84c31" />
            </label>
            <label class="annotation-control" for="annotationWidth">
              <span>粗细</span>
              <input id="annotationWidth" type="range" min="2" max="14" step="1" value="4" />
            </label>
            <button id="clearAnnotationsButton" class="annotation-clear-button" type="button">清空</button>
          </div>
        </div>
      </section>

      <div class="workspace">
      <section class="reader-panel">
        <div id="readerStage" class="reader-stage">
          <header class="reader-header">
            <div id="titleGrid" class="title-grid"></div>
            <div class="author-stack">
              <div id="authorPinyin" class="author-pinyin"></div>
              <div id="authorGrid" class="author-grid"></div>
            </div>
          </header>

          <section id="articleCanvas" class="article-canvas"></section>

          <section id="translationSection" class="supplement-card hidden">
            <div class="section-kicker">译文</div>
            <div id="translationBody" class="supplement-body"></div>
          </section>

          <section id="notesSection" class="supplement-card hidden">
            <div class="section-kicker">注释</div>
            <div id="notesBody" class="notes-list"></div>
          </section>

          <section id="recitationSection" class="supplement-card hidden">
            <div class="section-kicker">朗诵参考</div>
            <div id="recitationBody" class="recitation-list"></div>
          </section>

          <svg id="annotationLayer" class="annotation-layer" aria-hidden="true"></svg>
        </div>
      </section>

      <aside class="control-panel">
        <section class="query-card">
          <div class="query-card-title">内容查询</div>
          <label class="query-label">
            <span>题目</span>
            <input id="searchTitle" class="query-input" type="text" placeholder="例如：岳阳楼记、静夜思、桃花源记" />
          </label>
          <label class="query-label">
            <span>作者</span>
            <input id="searchAuthor" class="query-input" type="text" placeholder="可选，用于缩小结果范围" />
          </label>
          <button id="searchButton" class="query-button" type="button">排版显示</button>
        </section>

        <div class="preview-frame">
          <div class="preview-paper">
            <div id="previewSnapshot" class="preview-snapshot"></div>
          </div>
        </div>

        <button id="downloadPdfButton" class="action-button action-button-primary">下载PDF</button>
        <button id="previewPdfButton" class="action-button action-button-secondary">查看PDF效果</button>

        <div class="panel-divider">
          <span>PDF设置</span>
        </div>
      </aside>
      </div>
    </main>
  </div>

  <dialog id="pdfDialog" class="pdf-dialog">
    <div class="pdf-dialog-inner">
      <div class="pdf-dialog-head">
        <div>PDF效果预览</div>
        <button id="closeDialogButton" class="dialog-close" type="button">关闭</button>
      </div>
      <div id="dialogPreviewHost" class="dialog-preview-host"></div>
    </div>
  </dialog>

  <dialog id="annotationHelpDialog" class="annotation-help-dialog">
    <div class="annotation-help-card">
      <div class="annotation-help-title">批注模式说明</div>
      <p class="annotation-help-copy">单指书写批注，双指拖动画布。</p>
      <button id="annotationHelpConfirmButton" class="annotation-help-button" type="button">知道了</button>
    </div>
  </dialog>

  <div id="humanVerificationOverlay" class="human-verification-overlay" aria-modal="true" role="dialog" aria-labelledby="humanVerificationTitle">
    <div class="human-verification-card">
      <h2 id="humanVerificationTitle" class="human-verification-title">访问前验证</h2>
      <p class="human-verification-copy">为减少异常请求，进入排版页前需要先完成人机确认。验证通过后才允许查询内容和访问接口。</p>
      <label class="human-verification-check" for="humanVerificationCheckbox">
        <input id="humanVerificationCheckbox" type="checkbox" />
        <span>我不是机器人</span>
      </label>
      <button id="humanVerificationButton" class="human-verification-action" type="button" disabled>继续访问</button>
      <div id="humanVerificationMessage" class="human-verification-message"></div>
    </div>
  </div>

  <script src="./human-verification.js?v=20260712"></script>
  <script src="./app.js?v=20260712"></script>
</body>
</html>
